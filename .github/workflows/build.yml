name: Build & Validate Drivers

on:
  push:
    branches: ['v5.4', 'v5.15', 'v6.1', 'v6.6', 'v6.12']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      kv: ${{ steps.m.outputs.kv }}
      major: ${{ steps.m.outputs.major }}
    steps:
      - id: m
        run: |
          REF="${GITHUB_REF_NAME}"
          [[ "$REF" == */merge ]] && REF="${{ github.head_ref }}"
          KV="${REF#v}"
          echo "kv=${KV}" >> "$GITHUB_OUTPUT"
          echo "major=${KV%%.*}" >> "$GITHUB_OUTPUT"

  validate-patches:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Download & validate patches
        run: |
          KV="${{ needs.setup.outputs.kv }}"
          MAJ="${{ needs.setup.outputs.major }}"
          curl -fSL --retry 3 -o /tmp/linux.tar.xz \
            "https://cdn.kernel.org/pub/linux/kernel/v${MAJ}.x/linux-${KV}.tar.xz"
          mkdir -p /tmp/linux-src && tar xf /tmp/linux.tar.xz -C /tmp/linux-src --strip-components=1
          cd /tmp/linux-src
          ERRORS=0
          for pf in "$GITHUB_WORKSPACE/patches"/*.patch; do
            [ -f "$pf" ] || continue
            name=$(basename "$pf")
            head -1 "$pf" | grep -q "No changes" && echo "⊘ $name: no changes needed" && continue
            echo "→ $name"
            patch --dry-run -p1 < "$pf" && echo "✓ $name" || { echo "✗ $name FAILED"; ERRORS=$((ERRORS+1)); }
          done
          exit $ERRORS

  build-out-of-tree:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential libelf-dev bc flex bison

      - name: Download kernel ${{ needs.setup.outputs.kv }}
        run: |
          KV="${{ needs.setup.outputs.kv }}"
          MAJ="${{ needs.setup.outputs.major }}"
          curl -fSL --retry 3 -o /tmp/linux.tar.xz \
            "https://cdn.kernel.org/pub/linux/kernel/v${MAJ}.x/linux-${KV}.tar.xz"
          tar xf /tmp/linux.tar.xz -C /tmp --strip-components=1

      - name: Configure & build kernel with USB/NET subsystems
        run: |
          cd /tmp
          # Start from allnoconfig, then enable what we need
          make allnoconfig
          # Enable core subsystems as built-in
          scripts/config --enable CONFIG_64BIT
          scripts/config --enable CONFIG_MODULES
          scripts/config --enable CONFIG_PRINTK
          scripts/config --enable CONFIG_PROC_FS
          scripts/config --enable CONFIG_SYSFS
          scripts/config --enable CONFIG_DEVTMPFS
          scripts/config --enable CONFIG_TTY
          scripts/config --enable CONFIG_BLOCK
          scripts/config --enable CONFIG_GENERIC_ALLOCATOR
          scripts/config --enable CONFIG_NET
          scripts/config --enable CONFIG_INET
          scripts/config --enable CONFIG_CRC32
          scripts/config --enable CONFIG_CRC16
          scripts/config --enable CONFIG_CRC_CCITT
          scripts/config --enable CONFIG_USB
          scripts/config --enable CONFIG_USB_SUPPORT
          scripts/config --enable CONFIG_USB_COMMON
          scripts/config --enable CONFIG_USB_ARCH_HAS_HCD
          scripts/config --enable CONFIG_USB_ANNOUNCE_NEW_DEVICES
          # Enable USB core as built-in (needed for modpost symbol resolution)
          scripts/config --enable CONFIG_USB_SERIAL
          scripts/config --enable CONFIG_USB_SERIAL_CONSOLE
          # Build usbserial as built-in so symbols are in vmlinux
          scripts/config --set-val CONFIG_USB_SERIAL y
          scripts/config --enable CONFIG_USB_SERIAL_WWAN
          scripts/config --enable CONFIG_USB_SERIAL_OPTION
          # Enable networking core
          scripts/config --enable CONFIG_USB_NET_DRIVERS
          scripts/config --enable CONFIG_USB_ACM
          scripts/config --enable CONFIG_WWAN
          scripts/config --enable CONFIG_WWAN_CORE
          # Enable module support for our out-of-tree modules
          scripts/config --enable CONFIG_MODULE_UNLOAD
          scripts/config --enable CONFIG_NET_CORE
          scripts/config --enable CONFIG_FIB_RULES
          scripts/config --enable CONFIG_MULTIUSER
          scripts/config --enable CONFIG_FUTEX
          scripts/config --enable CONFIG_RATIONAL
          scripts/config --enable CONFIG_CRC32_SLICEBY8
          make olddefconfig 2>&1 | tail -5
          # Verify key configs
          grep -E 'CONFIG_(USB_SERIAL|USB_NET|WWAN|MODULES)[= ]' .config | head -10
          # Build vmlinux (includes usbserial built-in)
          make vmlinux -j$(nproc) HOSTCFLAGS="-Wno-error" 2>&1 | tail -5
          make modules_prepare HOSTCFLAGS="-Wno-error" 2>&1 | tail -5

      - name: Build out-of-tree drivers
        run: |
          make KDIR=/tmp 2>&1 | tee /tmp/build.log || true
          echo "=== Build log ==="
          tail -30 /tmp/build.log

      - name: Verify modules
        run: |
          ERRORS=0
          for mod in option.ko usb_wwan.ko qmi_wwan.ko; do
            found=$(find build/ -name "$mod" -print -quit 2>/dev/null)
            if [ -n "$found" ]; then
              echo "✓ $mod"
            else
              echo "✗ $mod NOT found"
              ERRORS=$((ERRORS + 1))
            fi
          done
          # Check compilation errors (not modpost — we handle that separately)
          if grep -E 'fatal error:' /tmp/build.log; then
            echo "✗ Compilation errors!"
            ERRORS=$((ERRORS + 1))
          fi
          exit $ERRORS

  summary:
    needs: [setup, validate-patches, build-out-of-tree]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "## kernel ${{ needs.setup.outputs.kv }}"
          echo "patches: ${{ needs.validate-patches.result }}"
          echo "build:   ${{ needs.build-out-of-tree.result }}"
          [ "${{ needs.validate-patches.result }}" = "success" ] && \
          [ "${{ needs.build-out-of-tree.result }}" = "success" ] || exit 1
